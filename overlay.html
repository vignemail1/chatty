<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --card: rgba(8,12,24,.86);
      --border: rgba(255,255,255,.12);
      --text: #f6f8ff;
      --muted: #b8c2e2;
      --accent: #7c9cff;
      --accent-soft: rgba(124,156,255,.16);
      --shadow: 0 24px 70px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%;
      background: transparent; overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
    }
    body {
      display: flex;
      align-items: var(--overlay-align, end);
      justify-content: var(--overlay-justify, start);
      padding: 32px;
    }

    .overlay {
      width: fit-content;
      min-width: 280px;
      max-width: min(1400px, calc(100vw - 64px));
      opacity: 0; transform: translateY(18px) scale(.985);
      transition: opacity .28s ease, transform .28s ease;
      pointer-events: none;
    }
    .overlay.visible { opacity: 1; transform: translateY(0) scale(1); }
    body[data-pos-v="top"]    .overlay:not(.visible) { transform: translateY(-18px) scale(.985); }
    body[data-pos-v="middle"] .overlay:not(.visible) { transform: scale(.985); }
    body[data-pos-v="bottom"] .overlay:not(.visible) { transform: translateY(18px) scale(.985); }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)), var(--card);
      border: 1px solid var(--border); border-radius: 24px;
      box-shadow: var(--shadow); backdrop-filter: blur(18px);
      display: flex; flex-direction: column;
      width: 100%;
    }
    .topline {
      display: flex; align-items: center;
      padding: 9px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(90deg, var(--accent-soft), transparent 70%);
      flex-shrink: 0;
    }
    .topline h1 {
      margin: 0; font-size: 13px; font-weight: 700;
      letter-spacing: .04em; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .content { padding: 16px 20px 20px; }
    .author {
      display: inline-flex; align-items: center; gap: 10px;
      margin-bottom: 10px; font-size: 18px; font-weight: 800;
    }
    .author .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: currentColor; box-shadow: 0 0 0 5px rgba(255,255,255,.06); flex-shrink: 0;
    }
    .message {
      font-size: clamp(28px, 2.8vw, 44px); line-height: 1.4; color: var(--text); font-weight: 700;
      white-space: pre-wrap; word-break: break-word; text-wrap: pretty;
      text-shadow: 0 2px 10px rgba(0,0,0,.22);
    }
    /* Emotes : taille héritée du contexte pour s'adapter automatiquement */
    .message img.emote {
      height: 1.3em;
      width: auto;
      vertical-align: middle;
      margin: 0 2px;
      display: inline-block;
    }
    .history-text img.emote {
      height: 1.3em;
      width: auto;
      vertical-align: middle;
      margin: 0 2px;
      display: inline-block;
    }
    .msg-meta { margin-top: 12px; color: var(--muted); font-size: 13px; }

    .card.history-mode .topline { background: linear-gradient(90deg, rgba(93,228,199,.14), transparent 70%); }
    .history-list { display: flex; flex-direction: column; gap: 0; }
    .history-item {
      padding: 13px 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex; flex-direction: column; gap: 4px;
    }
    .history-item:last-child { border-bottom: none; padding-bottom: 18px; }
    .history-item:first-child { padding-top: 16px; }
    .history-text {
      font-size: clamp(16px, 1.6vw, 24px); color: var(--text); font-weight: 600;
      word-break: break-word; white-space: pre-wrap; line-height: 1.4;
    }
    .history-time { font-size: 11px; color: var(--muted); }
    .history-empty { padding: 20px; font-size: 14px; color: var(--muted); text-align: center; }

    @media (max-width: 700px) {
      body { padding: 18px; }
      .overlay { max-width: calc(100vw - 36px); }
      .content { padding: 14px 16px 18px; }
      .message { font-size: clamp(22px, 6vw, 32px); }
      .author { font-size: 16px; }
    }
  </style>
  <style id="customStyle"></style>
</head>
<body data-pos-v="bottom">
  <div class="overlay" id="overlay">
    <div class="card" id="card">
      <div class="topline">
        <h1 id="title">Message mis en avant</h1>
      </div>
      <div class="content" id="hlContent">
        <div class="author" id="author" style="color:#c8d4ff">
          <span class="dot"></span><span>Viewer</span>
        </div>
        <div class="message" id="message">Le message sélectionné apparaîtra ici.</div>
        <div class="msg-meta" id="msgMeta"></div>
      </div>
      <div class="history-list" id="historyList" style="display:none"></div>
    </div>
  </div>

  <script>
    const overlay      = document.getElementById('overlay');
    const card         = document.getElementById('card');
    const titleEl      = document.getElementById('title');
    const authorEl     = document.getElementById('author');
    const authorNameEl = authorEl.querySelector('span:last-child');
    const messageEl    = document.getElementById('message');
    const msgMetaEl    = document.getElementById('msgMeta');
    const hlContent    = document.getElementById('hlContent');
    const historyList  = document.getElementById('historyList');
    const customStyle  = document.getElementById('customStyle');

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /**
     * Rendu HTML d'un message : emotes Twitch (positions IRC exactes)
     * puis emotes tierces (remplacement token-par-token sur les segments texte).
     *
     * Les emotes Twitch sont toujours passées dans p.message.emotes (tableau
     * [{id, start, end, name}] sérialisé par le panneau de contrôle).
     * Les emotes tierces sont dans p.thirdPartyEmotes (objet plain JSON).
     *
     * Fix : désérialisation robuste de thirdPartyEmotes (null/undefined/objet vide),
     * guard sur token non-vide avant lookup dans la Map.
     */
    function renderMessageHtml(rawMessage, twitchEmotes, thirdParty) {
      // Désérialisation robuste : accepte null, undefined, objet vide, ou objet plain
      let map;
      if (thirdParty && typeof thirdParty === 'object' && !(thirdParty instanceof Map)) {
        map = new Map(Object.entries(thirdParty));
      } else if (thirdParty instanceof Map) {
        map = thirdParty;
      } else {
        map = new Map();
      }

      const chars = [...rawMessage];
      // S'assurer que les emotes Twitch sont bien des objets avec les bons champs
      const sorted = (Array.isArray(twitchEmotes) ? twitchEmotes : [])
        .filter(em => typeof em.start === 'number' && typeof em.end === 'number')
        .slice()
        .sort((a, b) => a.start - b.start);

      const segments = [];
      let cursor = 0;
      for (const em of sorted) {
        if (em.start > cursor) segments.push({ type: 'text', value: chars.slice(cursor, em.start).join('') });
        segments.push({
          type: 'img',
          url:  `https://static-cdn.jtvnw.net/emoticons/v2/${esc(String(em.id))}/default/dark/2.0`,
          name: em.name || em.id
        });
        cursor = em.end + 1;
      }
      if (cursor < chars.length) segments.push({ type: 'text', value: chars.slice(cursor).join('') });
      if (!segments.length) segments.push({ type: 'text', value: rawMessage });

      let html = '';
      for (const seg of segments) {
        if (seg.type === 'img') {
          html += `<img class="emote" src="${seg.url}" alt="${esc(seg.name)}" title="${esc(seg.name)}" loading="lazy">`;
        } else {
          // Split sur les espaces en conservant les séparateurs pour ne pas les perdre
          // Guard sur token non-vide pour éviter les faux lookups dans la Map
          const tokens = seg.value.split(/(\s+)/);
          for (const token of tokens) {
            if (!token) continue;
            // Les tokens purement whitespace ne peuvent pas être des emotes
            if (/^\s+$/.test(token)) {
              html += esc(token);
              continue;
            }
            const tp = map.get(token);
            if (tp && tp.url) {
              html += `<img class="emote" src="${esc(tp.url)}" alt="${esc(token)}" title="${esc(token)} (${esc(tp.source || '?')})" loading="lazy">`;
            } else {
              html += esc(token);
            }
          }
        }
      }
      return html;
    }

    function applyCustomCss(css) { customStyle.textContent = css || ''; }

    function applyPosition(p) {
      if (!p || !p.position) return;
      document.body.style.setProperty('--overlay-align',   p.alignItems    || 'end');
      document.body.style.setProperty('--overlay-justify', p.justifyContent || 'start');
      const posV = p.position.startsWith('top') ? 'top' : p.position.startsWith('bottom') ? 'bottom' : 'middle';
      document.body.setAttribute('data-pos-v', posV);
    }

    function showHighlight(p) {
      card.classList.remove('history-mode');
      hlContent.style.display = '';
      historyList.style.display = 'none';
      titleEl.textContent      = p.title || 'Message mis en avant';
      authorEl.style.color     = p.message.color || '#c8d4ff';
      authorNameEl.textContent = p.message.user  || 'Viewer';
      messageEl.innerHTML = renderMessageHtml(
        p.message.message  || '',
        p.message.emotes   || [],
        p.thirdPartyEmotes || null
      );
      msgMetaEl.textContent = (p.channel ? '#'+p.channel+' · ' : '') + formatTime(p.message.timestamp || Date.now());
      overlay.classList.add('visible');
    }

    function showHistory(p) {
      card.classList.add('history-mode');
      hlContent.style.display = 'none';
      historyList.style.display = '';
      const msgs = p.messages || [];
      const n = msgs.length;
      titleEl.textContent = '💬 ' + (p.user || 'Viewer') + ` — ${n} dernier${n > 1 ? 's' : ''} message${n > 1 ? 's' : ''}`;
      if (!msgs.length) {
        historyList.innerHTML = '<div class="history-empty">Aucun message trouvé.</div>';
      } else {
        historyList.innerHTML = msgs.map(m =>
          `<div class="history-item">
            <div class="history-text">${renderMessageHtml(m.message || '', m.emotes || [], p.thirdPartyEmotes || null)}</div>
            <div class="history-time">${formatTime(m.timestamp)}</div>
          </div>`
        ).join('');
      }
      overlay.classList.add('visible');
    }

    function handlePayload(p) {
      if (!p) return;
      if (p.position) applyPosition(p);
      if (p.customCss !== undefined) applyCustomCss(p.customCss);
      if (!p.type) return;
      if (p.type === 'highlight') showHighlight(p);
      if (p.type === 'history')   showHistory(p);
      if (p.type === 'clear')     overlay.classList.remove('visible');
      if (p.type === 'css')       applyCustomCss(p.customCss || '');
      if (p.type === 'position')  applyPosition(p);
    }

    // Restaurer l'état depuis localStorage au chargement
    try {
      const saved = localStorage.getItem('twitch-highlight-sync');
      if (saved) {
        const data = JSON.parse(saved);
        if (data.customCss !== undefined) applyCustomCss(data.customCss);
        if (data.position) applyPosition(data);
        handlePayload(data);
      }
    } catch(_) {}

    if ('BroadcastChannel' in window) {
      const bc = new BroadcastChannel('twitch-highlight-overlay');
      bc.onmessage = e => handlePayload(e.data);
    }
    window.addEventListener('storage', e => {
      if (e.key === 'twitch-highlight-sync' && e.newValue) {
        try { handlePayload(JSON.parse(e.newValue)); } catch(_) {}
      }
    });
  </script>
</body>
</html>
