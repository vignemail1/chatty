<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --card: rgba(8,12,24,.86);
      --border: rgba(255,255,255,.12);
      --text: #f6f8ff;
      --muted: #b8c2e2;
      --accent: #7c9cff;
      --accent-soft: rgba(124,156,255,.16);
      --shadow: 0 24px 70px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: Inter, system-ui, sans-serif; }
    body { display: grid; place-items: end start; padding: 32px; }
    .overlay {
      width: min(980px, calc(100vw - 64px));
      opacity: 0; transform: translateY(18px) scale(.985);
      transition: opacity .28s ease, transform .28s ease;
      pointer-events: none;
    }
    .overlay.visible { opacity: 1; transform: translateY(0) scale(1); }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)), var(--card);
      border: 1px solid var(--border); border-radius: 24px;
      box-shadow: var(--shadow); backdrop-filter: blur(18px); overflow: hidden;
    }
    .topline {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(90deg, var(--accent-soft), transparent 70%);
    }
    .badge {
      display: inline-flex; align-items: center; justify-content: center; min-width: 34px; height: 34px; border-radius: 999px;
      background: rgba(124,156,255,.18); border: 1px solid rgba(124,156,255,.28); color: #dbe3ff; font-weight: 800; font-size: 12px; letter-spacing: .08em;
    }
    .titles h1 { margin: 0; font-size: 19px; line-height: 1.1; color: var(--text); }
    .titles p  { margin: 5px 0 0; font-size: 13px; color: var(--muted); }
    .content { padding: 22px 22px 24px; }
    .author { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 20px; font-weight: 800; }
    .author .dot { width: 12px; height: 12px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 6px rgba(255,255,255,.06); }
    .message {
      font-size: clamp(28px, 2.8vw, 44px); line-height: 1.18; color: var(--text); font-weight: 700;
      text-wrap: pretty; word-break: break-word; white-space: pre-wrap;
      text-shadow: 0 2px 10px rgba(0,0,0,.22);
    }
    .meta { margin-top: 14px; color: var(--muted); font-size: 14px; }
    @media (max-width: 700px) {
      body { padding: 18px; }
      .overlay { width: calc(100vw - 36px); }
      .content { padding: 18px; }
      .message { font-size: clamp(22px, 6vw, 32px); }
      .author { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="card">
      <div class="topline">
        <div class="badge">LIVE</div>
        <div class="titles">
          <h1 id="title">Message mis en avant</h1>
          <p id="subtitle">Sélection depuis le chat en direct</p>
        </div>
      </div>
      <div class="content">
        <div class="author" id="author" style="color:#c8d4ff"><span class="dot"></span><span>Viewer</span></div>
        <div class="message" id="message">Le message sélectionné apparaîtra ici.</div>
        <div class="meta" id="meta"></div>
      </div>
    </div>
  </div>
  <script>
    const overlay      = document.getElementById('overlay');
    const titleEl      = document.getElementById('title');
    const subtitleEl   = document.getElementById('subtitle');
    const authorEl     = document.getElementById('author');
    const authorNameEl = authorEl.querySelector('span:last-child');
    const messageEl    = document.getElementById('message');
    const metaEl       = document.getElementById('meta');
    function formatTime(ts) { return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
    function showHighlight(p) {
      titleEl.textContent      = p.title    || 'Message mis en avant';
      subtitleEl.textContent   = p.subtitle || 'Sélection depuis le chat en direct';
      authorEl.style.color     = p.message.color || '#c8d4ff';
      authorNameEl.textContent = p.message.user  || 'Viewer';
      messageEl.textContent    = p.message.message || '';
      metaEl.textContent       = (p.channel?'#'+p.channel+' · ':'')+formatTime(p.message.timestamp||Date.now());
      overlay.classList.add('visible');
    }
    function handlePayload(p) {
      if (!p||!p.type) return;
      if (p.type==='highlight') showHighlight(p);
      if (p.type==='clear') overlay.classList.remove('visible');
    }
    if ('BroadcastChannel' in window) {
      const bc = new BroadcastChannel('twitch-highlight-overlay');
      bc.onmessage = e => handlePayload(e.data);
    }
    window.addEventListener('storage', e => {
      if (e.key==='twitch-highlight-sync'&&e.newValue) try { handlePayload(JSON.parse(e.newValue)); } catch(_){}
    });
    try { const last=localStorage.getItem('twitch-highlight-sync'); if(last) handlePayload(JSON.parse(last)); } catch(_){}
  </script>
</body>
</html>
