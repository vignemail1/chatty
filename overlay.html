<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --card: rgba(8,12,24,.86);
      --border: rgba(255,255,255,.12);
      --text: #f6f8ff;
      --muted: #b8c2e2;
      --accent: #7c9cff;
      --accent-soft: rgba(124,156,255,.16);
      --shadow: 0 24px 70px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%;
      background: transparent; overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
    }
    body {
      display: grid;
      place-items: end start;
      padding: 32px;
    }
    .overlay {
      width: min(980px, calc(100vw - 64px));
      opacity: 0; transform: translateY(18px) scale(.985);
      transition: opacity .28s ease, transform .28s ease;
      pointer-events: none;
    }
    .overlay.visible { opacity: 1; transform: translateY(0) scale(1); }

    /* card : hauteur naturelle selon contenu */
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01)), var(--card);
      border: 1px solid var(--border); border-radius: 24px;
      box-shadow: var(--shadow); backdrop-filter: blur(18px);
      display: flex; flex-direction: column;
    }

    /* Topline compact : juste le titre, pas de badge ni de subtitle */
    .topline {
      display: flex; align-items: center;
      padding: 9px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(90deg, var(--accent-soft), transparent 70%);
      flex-shrink: 0;
    }
    .topline h1 {
      margin: 0;
      font-size: 13px; font-weight: 700;
      letter-spacing: .04em;
      color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .content { padding: 16px 20px 20px; }
    .author {
      display: inline-flex; align-items: center; gap: 10px;
      margin-bottom: 10px; font-size: 18px; font-weight: 800;
    }
    .author .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: currentColor; box-shadow: 0 0 0 5px rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .message {
      font-size: clamp(28px, 2.8vw, 44px); line-height: 1.18; color: var(--text); font-weight: 700;
      text-wrap: pretty; word-break: break-word; white-space: pre-wrap;
      text-shadow: 0 2px 10px rgba(0,0,0,.22);
    }
    .meta { margin-top: 12px; color: var(--muted); font-size: 13px; }

    @media (max-width: 700px) {
      body { padding: 18px; }
      .overlay { width: calc(100vw - 36px); }
      .content { padding: 14px 16px 18px; }
      .message { font-size: clamp(22px, 6vw, 32px); }
      .author { font-size: 16px; }
    }
  </style>
  <!-- CSS personnalisé injecté depuis le panneau de contrôle -->
  <style id="customStyle"></style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="card" id="card">
      <div class="topline">
        <h1 id="title">Message mis en avant</h1>
      </div>
      <div class="content">
        <div class="author" id="author" style="color:#c8d4ff">
          <span class="dot"></span><span>Viewer</span>
        </div>
        <div class="message" id="message">Le message sélectionné apparaîtra ici.</div>
        <div class="meta" id="meta"></div>
      </div>
    </div>
  </div>

  <script>
    const overlay      = document.getElementById('overlay');
    const titleEl      = document.getElementById('title');
    const authorEl     = document.getElementById('author');
    const authorNameEl = authorEl.querySelector('span:last-child');
    const messageEl    = document.getElementById('message');
    const metaEl       = document.getElementById('meta');
    const customStyle  = document.getElementById('customStyle');

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }

    function showHighlight(p) {
      titleEl.textContent      = p.title || 'Message mis en avant';
      authorEl.style.color     = p.message.color || '#c8d4ff';
      authorNameEl.textContent = p.message.user  || 'Viewer';
      messageEl.textContent    = p.message.message || '';
      metaEl.textContent       = (p.channel ? '#'+p.channel+' · ' : '') + formatTime(p.message.timestamp || Date.now());
      overlay.classList.add('visible');
    }

    function applyCustomCss(css) {
      customStyle.textContent = css || '';
    }

    function handlePayload(p) {
      if (!p || !p.type) return;
      if (p.type === 'highlight') showHighlight(p);
      if (p.type === 'clear')     overlay.classList.remove('visible');
      if (p.customCss !== undefined) applyCustomCss(p.customCss);
    }

    try {
      const saved = localStorage.getItem('twitch-highlight-sync');
      if (saved) {
        const data = JSON.parse(saved);
        if (data.customCss !== undefined) applyCustomCss(data.customCss);
        handlePayload(data);
      }
    } catch(_) {}

    if ('BroadcastChannel' in window) {
      const bc = new BroadcastChannel('twitch-highlight-overlay');
      bc.onmessage = e => handlePayload(e.data);
    }
    window.addEventListener('storage', e => {
      if (e.key === 'twitch-highlight-sync' && e.newValue) {
        try { handlePayload(JSON.parse(e.newValue)); } catch(_) {}
      }
    });
  </script>
</body>
</html>
